name: Update Publications

on:
  schedule:
    - cron: '0 6 * * 1'   # Runs every Monday at 6am UTC
  workflow_dispatch:        # Also allows you to trigger it manually

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: pip install requests

      - name: Fetch publications from ORCID
        run: python fetch_publications.py

      - name: Save updated data back to the repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/publications.json
          git diff --staged --quiet || git commit -m "Update publications data [automated]"
          git push

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build and publish the website
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
